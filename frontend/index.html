<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股戰情室 V13</title>
<style>
body{margin:0;background:#080b12;color:#fff;font-family:Arial,"Noto Sans TC",sans-serif}
.header{padding:22px;background:#111827;border-bottom:1px solid #263043}
.title{font-size:28px;font-weight:900;color:#ff4d57}
.sub{color:#9ca3af;margin-top:6px}
.container{padding:18px}
.btn{width:100%;padding:15px;background:#ff4d57;border:0;color:white;border-radius:14px;font-size:18px;font-weight:800}
.card{background:#111827;border:1px solid #263043;border-radius:18px;padding:18px;margin:16px 0}
.badge{display:inline-block;background:#ff4d57;padding:6px 10px;border-radius:10px;font-weight:800}
.stock{display:flex;justify-content:space-between;align-items:center}
.name{font-size:22px;font-weight:900}
.code{color:#9ca3af;margin-top:4px}
.score{font-size:34px;font-weight:900;color:#ff4d57}
.small{color:#9ca3af;font-size:14px;margin-top:10px;line-height:1.6}
.footer{text-align:center;color:#6b7280;font-size:12px;padding:20px}
</style>
</head>
<body>

<div class="header">
  <div class="title">台股戰情室 V13</div>
  <div class="sub">飆股排行榜・資金強度・決策輔助</div>
</div>

<div class="container">
  <button class="btn" onclick="loadStocks()">🚀 更新飆股排行</button>

  <div class="card">
    <span class="badge">市場模式</span>
    <h2 id="marketMode">等待資料...</h2>
    <div class="small">依平均分數判斷目前偏主攻、觀察或防守。</div>
  </div>

  <h2>🔥 今日飆股候選</h2>
  <div id="stocks"><div class="card">載入中...</div></div>
</div>

<div class="footer">
  V13 股票系統｜僅供輔助決策，不保證獲利
</div>

<script>
const API_URL = "https://stock-agent-v12-production-5c74.up.railway.app/top";

async function loadStocks(){
  const box = document.getElementById("stocks");
  const market = document.getElementById("marketMode");
  box.innerHTML = "<div class='card'>載入中...</div>";

  try{
    const res = await fetch(API_URL);
    const data = await res.json();

    if(!Array.isArray(data) || data.length === 0){
      box.innerHTML = "<div class='card'>目前沒有資料</div>";
      market.innerText = "防守";
      return;
    }

    const avg = data.reduce((s,x)=>s+x.score,0)/data.length;
    market.innerText = avg >= 90 ? "🔥 主攻模式" : avg >= 75 ? "⚠️ 觀察偏多" : "🧊 防守模式";

    box.innerHTML = data.map((s,i)=>{
      let advice = s.score >= 90 ? "可列入主攻" : s.score >= 80 ? "強勢觀察" : "保守觀察";
      return `
        <div class="card">
          <div class="stock">
            <div>
              <div class="name">${i+1}. ${s.name}</div>
              <div class="code">${s.code}</div>
            </div>
            <div class="score">${s.score}</div>
          </div>
          <div class="small">
            建議：<b>${advice}</b><br>
            買進：回測不破支撐再進<br>
            停損：跌破關鍵低點<br>
            停利：分批出場
          </div>
        </div>
      `;
    }).join("");

  }catch(e){
    box.innerHTML = "<div class='card'>❌ 讀取失敗，請確認 Railway API 是否正常</div>";
    market.innerText = "資料異常";
  }
}

loadStocks();
</script>

</body>
</html>
